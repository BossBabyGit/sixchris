name: Update Leaderboard

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run script
        run: node scripts/updateLeaderboard.js
        env:
          BITFORTUNE_API_KEY: ${{ secrets.BITFORTUNE_API_KEY }}

      - name: Commit & push leaderboard.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/leaderboard.json
          git commit -m "Update leaderboard" || echo "No changes to commit"
          git push